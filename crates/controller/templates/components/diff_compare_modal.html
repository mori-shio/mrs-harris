<div id="diff-modal" class="detail-modal-overlay" hx-boost="false">
    <div class="detail-modal-container">
        <div class="detail-modal-header">
            <h3 class="detail-modal-title">
                <i data-lucide="git-compare" style="color:var(--color-primary); width:18px; height:18px;"></i>
                設定差分比較 <span id="diff-title-versions" class="detail-modal-title-version"></span>
            </h3>
            <button onclick="closeDiffModal()" class="detail-modal-close">&times;</button>
        </div>
        
        <div id="diff-content" class="detail-modal-body">
            <!-- Diff result table will be injected dynamically -->
        </div>
        
        <div class="detail-modal-footer">
            <button class="btn btn-secondary" onclick="closeDiffModal()">閉じる</button>
        </div>
    </div>
</div>
