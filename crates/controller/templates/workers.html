{% extends "base.html" %}

{% block title %}ワーカー状態 | Mrs. Harris{% endblock %}

{% block nav_workers %}active{% endblock %}

{% block content %}
<div class="page-header">
    <div class="page-title">
        <h2>ワーカー状態監視</h2>
        <p>AWS Fargate タスクおよび AWS Lambda 関数の動的起動状態とハートビートの確認</p>
    </div>
</div>

<!-- HTMX Dynamic Area -->
<div id="workers-live" 
     hx-get="/workers/live" 
     hx-trigger="load, every 10s" 
     hx-target="this" 
     hx-swap="innerHTML">
    
    <!-- Initial Loading State -->
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; gap: 16px;">
        <div class="status-indicator status-indicator-running" style="width: 24px; height: 24px;"></div>
        <p style="color: var(--text-muted); font-size: 0.9rem;">ワーカーの最新状態をロードしています...</p>
    </div>
</div>
{% endblock %}
