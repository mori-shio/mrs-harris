<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mrs. Harris{% endblock %}</title>
    <!-- Premium Stylesheet -->
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- HTMX for AJAX and SPA transitions -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <meta name="htmx-config" content='{"historyCacheSize": 0, "refreshOnHistoryMiss": true}'>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Sidebar Hierarchical Menu Styles -->
    <style>
        .sidebar-item-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        
        .sidebar-group-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: var(--radius-md);
            font-weight: 500;
            font-size: 0.95rem;
            transition: var(--transition-smooth);
            user-select: none;
        }
        
        .sidebar-group-header:hover {
            color: var(--text-primary);
            background-color: rgba(255, 255, 255, 0.04);
        }
        
        .sidebar-group-header .group-title {
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }
        
        .sidebar-sub-menu {
            list-style: none;
            padding-left: 20px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-top: 2px;
            margin-bottom: 6px;
        }
        
        .sidebar-sub-item a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: var(--radius-sm);
            font-weight: 400;
            font-size: 0.88rem;
            transition: var(--transition-smooth);
        }
        
        .sidebar-sub-item a:hover {
            color: var(--text-primary);
            background-color: rgba(255, 255, 255, 0.03);
        }
        
        .sidebar-sub-item.active a {
            color: var(--text-primary);
            font-weight: 600;
            background: rgba(14, 165, 233, 0.06);
            border: 1px solid rgba(14, 165, 233, 0.15);
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body hx-boost="true">
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>

    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <i data-lucide="network" style="color: var(--color-primary); width: 28px; height: 28px;"></i>
            <h1>Mrs. Harris</h1>
        </div>
        <ul class="sidebar-menu">
            <li class="sidebar-item {% block nav_dashboard %}{% endblock %}">
                <a href="/">
                    <i data-lucide="layout-dashboard" style="width: 18px; height: 18px;"></i>
                    ダッシュボード
                </a>
            </li>
            <li class="sidebar-item {% block nav_calendar %}{% endblock %}">
                <a href="/calendar">
                    <i data-lucide="calendar" style="width: 18px; height: 18px;"></i>
                    カレンダー
                </a>
            </li>
            
            <!-- ジョブグループ -->
            <li class="sidebar-item-group">
                <div class="sidebar-group-header" onclick="toggleSidebarGroup(this)">
                    <span class="group-title">
                        <i data-lucide="git-pull-request" style="width: 18px; height: 18px;"></i>
                        ジョブ
                    </span>
                    <i data-lucide="chevron-down" class="chevron" style="width: 16px; height: 16px; transition: transform 0.2s;"></i>
                </div>
                <ul class="sidebar-sub-menu">
                    <li class="sidebar-sub-item {% block nav_jobs %}{% endblock %}">
                        <a href="/jobs">
                            <i data-lucide="list" style="width: 14px; height: 14px;"></i>
                            ジョブ一覧
                        </a>
                    </li>
                    <li class="sidebar-sub-item {% block nav_spaces %}{% endblock %}">
                        <a href="/spaces">
                            <i data-lucide="layout-grid" style="width: 14px; height: 14px;"></i>
                            スペース管理
                        </a>
                    </li>
                </ul>
            </li>

            <!-- ワーカーグループ -->
            <li class="sidebar-item-group">
                <div class="sidebar-group-header" onclick="toggleSidebarGroup(this)">
                    <span class="group-title">
                        <i data-lucide="cpu" style="width: 18px; height: 18px;"></i>
                        ワーカー
                    </span>
                    <i data-lucide="chevron-down" class="chevron" style="width: 16px; height: 16px; transition: transform 0.2s;"></i>
                </div>
                <ul class="sidebar-sub-menu">
                    <li class="sidebar-sub-item {% block nav_worker_defs %}{% endblock %}">
                        <a href="/worker-definitions">
                            <i data-lucide="server" style="width: 14px; height: 14px;"></i>
                            ワーカー定義
                        </a>
                    </li>
                    <li class="sidebar-sub-item {% block nav_workers %}{% endblock %}">
                        <a href="/workers">
                            <i data-lucide="activity" style="width: 14px; height: 14px;"></i>
                            ワーカー状態
                        </a>
                    </li>
                </ul>
            </li>

            <li class="sidebar-item {% block nav_database %}{% endblock %}">
                <a href="/database">
                    <i data-lucide="database" style="width: 18px; height: 18px;"></i>
                    データベース
                </a>
            </li>
            <li class="sidebar-item {% block nav_settings %}{% endblock %}">
                <a href="/settings">
                    <i data-lucide="settings" style="width: 18px; height: 18px;"></i>
                    システム設定
                </a>
            </li>
        </ul>
        <div class="sidebar-footer">
            <span>Admin</span>
            <a href="/logout" style="color: var(--text-muted); cursor: pointer;" hx-boost="false">
                <i data-lucide="log-out" style="width: 16px; height: 16px;"></i>
            </a>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <script>
        // Initialize Lucide icons on page load and after HTMX swaps
        function initIcons() {
            lucide.createIcons();
        }
        
        function initSidebarGroups() {
            document.querySelectorAll('.sidebar-item-group').forEach((group, index) => {
                const groupTitleEl = group.querySelector('.group-title');
                const groupName = groupTitleEl ? groupTitleEl.textContent.trim() : 'group-' + index;
                const subMenu = group.querySelector('.sidebar-sub-menu');
                const chevron = group.querySelector('.chevron');
                
                const hasActiveChild = group.querySelector('.active');
                const savedState = localStorage.getItem('sidebar-group-' + groupName);
                
                let shouldExpand = false;
                if (hasActiveChild) {
                    shouldExpand = true;
                } else if (savedState !== null) {
                    shouldExpand = savedState === 'true';
                } else {
                    shouldExpand = false;
                }
                
                if (shouldExpand) {
                    subMenu.style.display = 'flex';
                    if (chevron) chevron.style.transform = 'rotate(180deg)';
                } else {
                    subMenu.style.display = 'none';
                    if (chevron) chevron.style.transform = 'rotate(0deg)';
                }
            });
        }

        function toggleSidebarGroup(header) {
            const group = header.closest('.sidebar-item-group');
            const groupTitleEl = group.querySelector('.group-title');
            const groupName = groupTitleEl ? groupTitleEl.textContent.trim() : 'group';
            const subMenu = group.querySelector('.sidebar-sub-menu');
            const chevron = group.querySelector('.chevron');
            const isExpanded = subMenu.style.display === 'flex';
            
            if (isExpanded) {
                subMenu.style.display = 'none';
                if (chevron) chevron.style.transform = 'rotate(0deg)';
                localStorage.setItem('sidebar-group-' + groupName, 'false');
            } else {
                subMenu.style.display = 'flex';
                if (chevron) chevron.style.transform = 'rotate(180deg)';
                localStorage.setItem('sidebar-group-' + groupName, 'true');
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            initIcons();
            initSidebarGroups();
        });
        document.addEventListener("htmx:afterSwap", () => {
            initIcons();
            initSidebarGroups();
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
