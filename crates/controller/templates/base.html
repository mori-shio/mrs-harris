<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mrs. Harris{% endblock %}</title>
    <!-- Premium Stylesheet -->
    <link rel="stylesheet" href="/static/css/style.css?v=20260604a">
    <!-- HTMX for AJAX and SPA transitions -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <meta name="htmx-config" content='{"historyCacheSize": 0, "refreshOnHistoryMiss": true}'>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Sidebar Hierarchical Menu Styles -->
    <style>
        .sidebar-item-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        
        .sidebar-group-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: var(--radius-md);
            font-weight: 500;
            font-size: 0.95rem;
            transition: var(--transition-smooth);
            user-select: none;
        }
        
        .sidebar-group-header:hover {
            color: var(--text-primary);
            background-color: rgba(255, 255, 255, 0.04);
        }
        
        .sidebar-group-header .group-title {
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }
        
        .sidebar-sub-menu {
            list-style: none;
            padding-left: 20px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-top: 2px;
            margin-bottom: 6px;
        }
        
        .sidebar-sub-item a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: var(--radius-sm);
            font-weight: 400;
            font-size: 0.88rem;
            transition: var(--transition-smooth);
        }
        
        .sidebar-sub-item a:hover {
            color: var(--text-primary);
            background-color: rgba(255, 255, 255, 0.03);
        }
        
        .sidebar-sub-item.active a {
            color: var(--text-primary);
            font-weight: 600;
            background: rgba(14, 165, 233, 0.06);
            border: 1px solid rgba(14, 165, 233, 0.15);
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body hx-boost="true">
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>

    <header class="app-header">
        <div class="app-header-left">
            <button type="button" class="sidebar-toggle" aria-label="メニューペインを開閉" onclick="toggleSidebarVisibility()">
                <i data-lucide="panel-left-close" style="width: 18px; height: 18px;"></i>
            </button>
            <a href="/" class="app-header-brand">
                <i data-lucide="network" style="color: var(--color-primary); width: 22px; height: 22px;"></i>
                <h1>Mrs. Harris</h1>
            </a>
        </div>
        <div class="app-header-right"></div>
    </header>

    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <ul class="sidebar-menu">
            <li class="sidebar-item {% block nav_dashboard %}{% endblock %}">
                <a href="/">
                    <i data-lucide="layout-dashboard" style="width: 18px; height: 18px;"></i>
                    ダッシュボード
                </a>
            </li>
            <li class="sidebar-item {% block nav_calendar %}{% endblock %}">
                <a href="/calendar">
                    <i data-lucide="calendar" style="width: 18px; height: 18px;"></i>
                    カレンダー
                </a>
            </li>
            
            <!-- ジョブグループ -->
            <li class="sidebar-item-group">
                <div class="sidebar-group-header" onclick="toggleSidebarGroup(this)">
                    <span class="group-title">
                        <i data-lucide="git-pull-request" style="width: 18px; height: 18px;"></i>
                        ジョブ管理
                    </span>
                    <i data-lucide="chevron-down" class="chevron" style="width: 16px; height: 16px; transition: transform 0.2s;"></i>
                </div>
                <ul class="sidebar-sub-menu">
                    <li class="sidebar-sub-item {% block nav_jobs %}{% endblock %}">
                        <a href="/jobs">
                            <i data-lucide="list" style="width: 14px; height: 14px;"></i>
                            ジョブ
                        </a>
                    </li>
                    <li class="sidebar-sub-item {% block nav_spaces %}{% endblock %}">
                        <a href="/spaces">
                            <i data-lucide="layout-grid" style="width: 14px; height: 14px;"></i>
                            スペース
                        </a>
                    </li>
                </ul>
            </li>

            <!-- ワーカーグループ -->
            <li class="sidebar-item-group">
                <div class="sidebar-group-header" onclick="toggleSidebarGroup(this)">
                    <span class="group-title">
                        <i data-lucide="cpu" style="width: 18px; height: 18px;"></i>
                        ワーカー管理
                    </span>
                    <i data-lucide="chevron-down" class="chevron" style="width: 16px; height: 16px; transition: transform 0.2s;"></i>
                </div>
                <ul class="sidebar-sub-menu">
                    <li class="sidebar-sub-item {% block nav_worker_defs %}{% endblock %}">
                        <a href="/worker-definitions">
                            <i data-lucide="server" style="width: 14px; height: 14px;"></i>
                            ワーカー定義
                        </a>
                    </li>
                    <li class="sidebar-sub-item {% block nav_workers %}{% endblock %}">
                        <a href="/workers">
                            <i data-lucide="activity" style="width: 14px; height: 14px;"></i>
                            状態監視
                        </a>
                    </li>
                </ul>
            </li>

            <li class="sidebar-item {% block nav_database %}{% endblock %}">
                <a href="/database">
                    <i data-lucide="database" style="width: 18px; height: 18px;"></i>
                    データベース
                </a>
            </li>
            <li class="sidebar-item {% block nav_settings %}{% endblock %}">
                <a href="/settings">
                    <i data-lucide="settings" style="width: 18px; height: 18px;"></i>
                    システム設定
                </a>
            </li>
        </ul>
        <div class="sidebar-footer">
            <span>Admin</span>
            <a href="/logout" style="color: var(--text-muted); cursor: pointer;" hx-boost="false">
                <i data-lucide="log-out" style="width: 16px; height: 16px;"></i>
            </a>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <div id="app-dialog-root" class="app-dialog-overlay" aria-hidden="true">
        <div class="app-dialog" role="dialog" aria-modal="true" aria-labelledby="app-dialog-title" aria-describedby="app-dialog-message">
            <div class="app-dialog-header">
                <h3 id="app-dialog-title">確認</h3>
                <button type="button" class="app-dialog-close" data-dialog-close aria-label="閉じる">&times;</button>
            </div>
            <p id="app-dialog-message" class="app-dialog-message"></p>
            <div class="app-dialog-actions">
                <button type="button" class="btn btn-secondary" data-dialog-cancel>キャンセル</button>
                <button type="button" class="btn btn-danger" data-dialog-confirm>実行</button>
            </div>
        </div>
    </div>

    <div id="app-toast-region" aria-live="polite" aria-atomic="false"></div>

    <script>
        window.appUi = window.appUi || {
            dialogResolver: null,
            requestSubmitWithoutSubmitterForms: new WeakSet(),
            requestSubmitPatched: false,
            scrollLockCount: 0,
            originalBodyOverflowY: "",
            originalBodyOverflowX: "",
            originalBodyPosition: "",
            originalBodyTop: "",
            originalBodyWidth: "",
            scrollLockY: 0,
            sidebarCollapsed: false
        };

        window.lockBodyScroll = function() {
            const body = document.body;
            if (!body) return;

            if (window.appUi.scrollLockCount === 0) {
                window.appUi.scrollLockY = window.scrollY;
                window.appUi.originalBodyOverflowY = body.style.overflowY;
                window.appUi.originalBodyOverflowX = body.style.overflowX;
                window.appUi.originalBodyPosition = body.style.position;
                window.appUi.originalBodyTop = body.style.top;
                window.appUi.originalBodyWidth = body.style.width;

                body.style.position = "fixed";
                body.style.top = (-window.appUi.scrollLockY) + "px";
                body.style.width = "100%";
                body.style.overflowY = "scroll";
                body.style.overflowX = "hidden";
            }

            window.appUi.scrollLockCount += 1;
        };

        window.unlockBodyScroll = function() {
            const body = document.body;
            if (!body || window.appUi.scrollLockCount === 0) return;

            window.appUi.scrollLockCount -= 1;

            if (window.appUi.scrollLockCount === 0) {
                body.style.overflowY = window.appUi.originalBodyOverflowY;
                body.style.overflowX = window.appUi.originalBodyOverflowX;
                body.style.position = window.appUi.originalBodyPosition;
                body.style.top = window.appUi.originalBodyTop;
                body.style.width = window.appUi.originalBodyWidth;
                window.scrollTo(0, window.appUi.scrollLockY);
            }
        };

        window.appConfirm = function(options = {}) {
            const overlay = document.getElementById("app-dialog-root");
            const title = document.getElementById("app-dialog-title");
            const message = document.getElementById("app-dialog-message");
            const confirmBtn = overlay.querySelector("[data-dialog-confirm]");
            const cancelBtn = overlay.querySelector("[data-dialog-cancel]");

            if (window.appUi.dialogResolver) {
                window.closeAppDialog(false);
            }

            overlay.classList.add("active");
            overlay.setAttribute("aria-hidden", "false");
            title.textContent = options.title || "確認";
            message.textContent = options.message || "";
            confirmBtn.textContent = options.confirmLabel || "実行";
            cancelBtn.textContent = options.cancelLabel || "キャンセル";
            cancelBtn.style.display = options.hideCancel ? "none" : "";
            window.lockBodyScroll();

            return new Promise(resolve => {
                window.appUi.dialogResolver = resolve;
            });
        };

        window.closeAppDialog = function(confirmed) {
            const overlay = document.getElementById("app-dialog-root");
            if (!overlay) return;
            const cancelBtn = overlay.querySelector("[data-dialog-cancel]");

            overlay.classList.remove("active");
            overlay.setAttribute("aria-hidden", "true");
            if (cancelBtn) {
                cancelBtn.style.display = "";
            }
            window.unlockBodyScroll();

            const resolve = window.appUi.dialogResolver;
            window.appUi.dialogResolver = null;

            if (resolve) {
                resolve(Boolean(confirmed));
            }
        };

        window.appToast = function(options = {}) {
            const region = document.getElementById("app-toast-region");
            if (!region || !options.message) return null;

            const toast = document.createElement("div");
            const timeoutMs = options.timeoutMs || 4000;

            toast.className = "app-toast";
            toast.setAttribute("role", "status");
            toast.textContent = options.message;
            region.appendChild(toast);

            window.setTimeout(() => {
                toast.remove();
            }, timeoutMs);

            return toast;
        };

        window.renderInlineNotice = function(container, options = {}) {
            if (!container || !options.message) return null;

            let host = container.querySelector(".inline-notice-host");
            if (!host) {
                host = document.createElement("div");
                host.className = "inline-notice-host";
                container.prepend(host);
            }

            host.replaceChildren();

            const notice = document.createElement("div");
            notice.className = "inline-notice";
            notice.setAttribute("role", "alert");
            notice.textContent = options.message;
            host.appendChild(notice);

            return notice;
        };

        if (!window.appUi.requestSubmitPatched && window.HTMLFormElement && window.HTMLFormElement.prototype.requestSubmit) {
            const originalRequestSubmit = window.HTMLFormElement.prototype.requestSubmit;
            window.HTMLFormElement.prototype.requestSubmit = function(submitter) {
                if (submitter === undefined) {
                    window.appUi.requestSubmitWithoutSubmitterForms.add(this);
                } else {
                    window.appUi.requestSubmitWithoutSubmitterForms.delete(this);
                }
                return originalRequestSubmit.call(this, submitter);
            };
            window.appUi.requestSubmitPatched = true;
        }

        function isSubmitControl(trigger) {
            if (!trigger) return false;
            if (trigger.tagName === "BUTTON") {
                return !trigger.type || trigger.type === "submit";
            }
            return trigger.tagName === "INPUT" && trigger.type === "submit";
        }

        function hasExplicitHtmxResume(trigger) {
            if (!window.htmx || !trigger) return false;
            const hxTrigger = trigger.getAttribute("hx-trigger");
            if (!hxTrigger) return false;
            return /(^|,)\s*confirmed-action(?=[\s,\[]|$)/.test(hxTrigger);
        }

        function findSubmitConfirmTrigger(form, submitter) {
            if (submitter && submitter.dataset.confirmMessage) {
                return submitter;
            }

            if (form.dataset.confirmMessage) {
                return form;
            }
            
            return null;
        }

        function resolveConfirmKind(trigger) {
            if (trigger.dataset.confirmKind) {
                return trigger.dataset.confirmKind;
            }

            if (trigger.tagName === "FORM" || isSubmitControl(trigger)) {
                return "form";
            }

            if (hasExplicitHtmxResume(trigger)) {
                return "htmx";
            }

            return "click";
        }

        function stopConfirmInterception(event) {
            event.preventDefault();
            event.stopPropagation();
            if (typeof event.stopImmediatePropagation === "function") {
                event.stopImmediatePropagation();
            }
        }

        function redispatchClick(trigger) {
            trigger.dispatchEvent(new MouseEvent("click", {
                bubbles: true,
                cancelable: true,
                view: window
            }));
        }

        async function handleConfirmTrigger(trigger, event) {
            if (!trigger || !trigger.dataset.confirmMessage || trigger.dataset.confirmPending === "true" || trigger.dataset.confirmBypass === "true") {
                return false;
            }

            stopConfirmInterception(event);
            trigger.dataset.confirmPending = "true";

            const confirmed = await window.appConfirm({
                title: trigger.dataset.confirmTitle || "確認",
                message: trigger.dataset.confirmMessage,
                confirmLabel: trigger.dataset.confirmConfirmLabel || "実行",
                cancelLabel: trigger.dataset.confirmCancelLabel || "キャンセル"
            });

            trigger.dataset.confirmPending = "false";
            if (!confirmed) {
                return true;
            }

            const confirmKind = resolveConfirmKind(trigger);
            trigger.dataset.confirmBypass = "true";

            try {
                if (confirmKind === "form") {
                    const form = trigger.tagName === "FORM" ? trigger : trigger.closest("form");
                    if (form) {
                        form.dataset.confirmBypass = "true";
                        if (trigger !== form && typeof form.requestSubmit === "function") {
                            form.requestSubmit(trigger);
                        } else if (typeof form.requestSubmit === "function") {
                            form.requestSubmit();
                        } else {
                            form.submit();
                        }
                    }
                    return true;
                }

                if (confirmKind === "htmx" && window.htmx) {
                    htmx.trigger(trigger, "confirmed-action");
                    return true;
                }

                redispatchClick(trigger);
                return true;
            } finally {
                window.setTimeout(() => {
                    delete trigger.dataset.confirmBypass;
                    const form = trigger.tagName === "FORM" ? trigger : trigger.closest("form");
                    if (form) {
                        delete form.dataset.confirmBypass;
                    }
                }, 0);
            }
        }

        document.addEventListener("click", event => {
            const trigger = event.target.closest("[data-confirm-message]");
            if (!trigger) return;
            void handleConfirmTrigger(trigger, event);
        }, true);

        document.addEventListener("submit", event => {
            const form = event.target;
            if (!(form instanceof HTMLFormElement)) return;

            const hasNoSubmitterRequest = window.appUi.requestSubmitWithoutSubmitterForms.has(form);
            const submitter = hasNoSubmitterRequest ? null : event.submitter;
            window.appUi.requestSubmitWithoutSubmitterForms.delete(form);

            if (form.dataset.confirmBypass === "true") return;

            const trigger = findSubmitConfirmTrigger(form, submitter);
            if (!trigger) return;
            void handleConfirmTrigger(trigger, event);
        }, true);

        document.addEventListener("click", event => {
            const closeTrigger = event.target.closest("[data-dialog-close], [data-dialog-cancel]");
            if (closeTrigger) {
                window.closeAppDialog(false);
                return;
            }

            if (event.target.matches("[data-dialog-confirm]")) {
                window.closeAppDialog(true);
            }
        });

        document.addEventListener("keydown", event => {
            if (event.key !== "Enter" || event.defaultPrevented) return;

            const target = event.target;
            if (!(target instanceof HTMLElement)) return;

            const form = target.closest(".modal-overlay form");
            if (!form) return;

            if (target.tagName === "TEXTAREA") {
                return;
            }

            event.preventDefault();
        }, true);

        // Initialize Lucide icons on page load and after HTMX swaps
        function initIcons() {
            lucide.createIcons();
        }
        
        function initSidebarGroups() {
            document.querySelectorAll('.sidebar-item-group').forEach((group, index) => {
                const groupTitleEl = group.querySelector('.group-title');
                const groupName = groupTitleEl ? groupTitleEl.textContent.trim() : 'group-' + index;
                const subMenu = group.querySelector('.sidebar-sub-menu');
                const chevron = group.querySelector('.chevron');
                
                const hasActiveChild = group.querySelector('.active');
                const savedState = localStorage.getItem('sidebar-group-' + groupName);
                
                let shouldExpand = false;
                if (hasActiveChild) {
                    shouldExpand = true;
                } else if (savedState !== null) {
                    shouldExpand = savedState === 'true';
                } else {
                    shouldExpand = false;
                }
                
                if (shouldExpand) {
                    subMenu.style.display = 'flex';
                    if (chevron) chevron.style.transform = 'rotate(180deg)';
                } else {
                    subMenu.style.display = 'none';
                    if (chevron) chevron.style.transform = 'rotate(0deg)';
                }
            });
        }

        function applySidebarVisibility(collapsed) {
            window.appUi.sidebarCollapsed = Boolean(collapsed);
            document.body.classList.toggle('sidebar-collapsed', window.appUi.sidebarCollapsed);

            const toggleIcon = document.querySelector('.sidebar-toggle [data-lucide]');
            if (toggleIcon) {
                toggleIcon.setAttribute(
                    'data-lucide',
                    window.appUi.sidebarCollapsed ? 'panel-left-open' : 'panel-left-close'
                );
            }

            if (window.lucide) {
                lucide.createIcons();
            }
        }

        function initSidebarVisibility() {
            const saved = localStorage.getItem('sidebar-collapsed');
            applySidebarVisibility(saved === 'true');
        }

        function toggleSidebarVisibility() {
            const next = !window.appUi.sidebarCollapsed;
            localStorage.setItem('sidebar-collapsed', next ? 'true' : 'false');
            applySidebarVisibility(next);
        }

        function toggleSidebarGroup(header) {
            const group = header.closest('.sidebar-item-group');
            const groupTitleEl = group.querySelector('.group-title');
            const groupName = groupTitleEl ? groupTitleEl.textContent.trim() : 'group';
            const subMenu = group.querySelector('.sidebar-sub-menu');
            const chevron = group.querySelector('.chevron');
            const isExpanded = subMenu.style.display === 'flex';
            
            if (isExpanded) {
                subMenu.style.display = 'none';
                if (chevron) chevron.style.transform = 'rotate(0deg)';
                localStorage.setItem('sidebar-group-' + groupName, 'false');
            } else {
                subMenu.style.display = 'flex';
                if (chevron) chevron.style.transform = 'rotate(180deg)';
                localStorage.setItem('sidebar-group-' + groupName, 'true');
            }
        }

        function initTableSorting() {
            document.querySelectorAll("table.data-table, table.table").forEach(table => {
                if (table.hasAttribute("data-no-sort")) return;

                const headers = table.querySelectorAll("thead th");
                const tbody = table.querySelector("tbody");
                if (!tbody) return;

                headers.forEach((th, colIndex) => {
                    const text = th.textContent.trim();
                    if (!text || th.classList.contains("no-sort") || th.querySelector("input[type='checkbox']")) {
                        return;
                    }

                    if (th.dataset.sortInit) return;
                    th.dataset.sortInit = "true";
                    th.style.cursor = "pointer";
                    th.style.userSelect = "none";
                    th.style.position = "relative";

                    const originalContent = th.innerHTML;
                    th.innerHTML = `
                        <div class="th-sort-container">
                            <span class="th-sort-label">${originalContent}</span>
                            <span class="th-sort-icon sort-icon-wrapper">
                                <i data-lucide="chevrons-up-down" style="width: 13px; height: 13px;"></i>
                            </span>
                        </div>
                    `;

                    const wrapper = th.querySelector(".sort-icon-wrapper");

                    th.addEventListener("click", () => {
                        const currentDir = th.dataset.sortDir;
                        let nextDir = "asc";
                        if (currentDir === "asc") {
                            nextDir = "desc";
                        }

                        headers.forEach(otherTh => {
                            if (otherTh !== th) {
                                otherTh.dataset.sortDir = "";
                                const otherWrapper = otherTh.querySelector(".sort-icon-wrapper");
                                if (otherWrapper) {
                                    otherWrapper.classList.remove("active");
                                    otherWrapper.innerHTML = `<i data-lucide="chevrons-up-down" style="width: 13px; height: 13px;"></i>`;
                                }
                            }
                        });

                        th.dataset.sortDir = nextDir;
                        wrapper.classList.add("active");
                        if (nextDir === "asc") {
                            wrapper.innerHTML = `<i data-lucide="arrow-up" style="width: 13px; height: 13px;"></i>`;
                        } else {
                            wrapper.innerHTML = `<i data-lucide="arrow-down" style="width: 13px; height: 13px;"></i>`;
                        }

                        if (window.lucide) {
                            lucide.createIcons();
                        }

                        const rows = Array.from(tbody.querySelectorAll("tr"));
                        if (rows.length <= 1 && rows[0] && rows[0].querySelector("td[colspan]")) {
                            return;
                        }

                        rows.sort((rowA, rowB) => {
                            const cellA = rowA.children[colIndex];
                            const cellB = rowB.children[colIndex];
                            if (!cellA || !cellB) return 0;

                            let valA = cellA.getAttribute("data-sort-value") || cellA.textContent.trim();
                            let valB = cellB.getAttribute("data-sort-value") || cellB.textContent.trim();

                            const dateRegex = /^\d{4}-\d{2}-\d{2}/;
                            if (dateRegex.test(valA) && dateRegex.test(valB)) {
                                const dA = new Date(valA.replace(/-/g, '/'));
                                const dB = new Date(valB.replace(/-/g, '/'));
                                return nextDir === "asc" ? dA - dB : dB - dA;
                            }

                            const cleanNum = (str) => {
                                let cleaned = str.replace(/[^\d.-]/g, '');
                                if (cleaned === "" || cleaned === "-") return null;
                                let parsed = parseFloat(cleaned);
                                return isNaN(parsed) ? null : parsed;
                            };

                            const numA = cleanNum(valA);
                            const numB = cleanNum(valB);
                            if (numA !== null && numB !== null) {
                                return nextDir === "asc" ? numA - numB : numB - numA;
                            }

                            const badgeA = cellA.querySelector(".badge");
                            const badgeB = cellB.querySelector(".badge");
                            if (badgeA && badgeB) {
                                valA = badgeA.textContent.trim();
                                valB = badgeB.textContent.trim();
                            }

                            return nextDir === "asc"
                                ? valA.localeCompare(valB, undefined, { numeric: true, sensitivity: 'base' })
                                : valB.localeCompare(valA, undefined, { numeric: true, sensitivity: 'base' });
                        });

                        rows.forEach(row => tbody.appendChild(row));
                    });
                });
            });

            if (window.lucide) {
                lucide.createIcons();
            }
        }

        if (!window.compareState) {
            window.compareState = {
                a: { version: null, payload: null },
                b: { version: null, payload: null },
                initialized: false
            };
        }

        function syncCompareStateFromDom() {
            const selectedA = document.querySelector('input[name="compare-a"]:checked');
            const selectedB = document.querySelector('input[name="compare-b"]:checked');

            window.compareState.a = selectedA
                ? { version: selectedA.value, payload: selectedA.dataset.payload }
                : { version: null, payload: null };
            window.compareState.b = selectedB
                ? { version: selectedB.value, payload: selectedB.dataset.payload }
                : { version: null, payload: null };

            document.querySelectorAll('input[name="compare-a"]').forEach(radio => {
                radio.dataset.wasChecked = radio.checked ? "true" : "false";
            });
            document.querySelectorAll('input[name="compare-b"]').forEach(radio => {
                radio.dataset.wasChecked = radio.checked ? "true" : "false";
            });
        }

        function initCompareState() {
            syncCompareStateFromDom();
            window.compareState.initialized = true;
        }

        function ensureCompareStateInitialized() {
            if (!window.compareState.initialized) {
                initCompareState();
                return;
            }
            syncCompareStateFromDom();
        }

        function restoreCompareState() {
            document.querySelectorAll('input[name="compare-a"]').forEach(radio => {
                const isSelected = window.compareState.a.version === radio.value;
                radio.checked = isSelected;
                radio.dataset.wasChecked = isSelected ? "true" : "false";
            });
            document.querySelectorAll('input[name="compare-b"]').forEach(radio => {
                const isSelected = window.compareState.b.version === radio.value;
                radio.checked = isSelected;
                radio.dataset.wasChecked = isSelected ? "true" : "false";
            });
        }

        function getCompareNoticeContainer() {
            return document.getElementById('job-history-panel')
                || document.getElementById('history-table-container')
                || document.getElementById('tab-history');
        }

        function clearCompareNotice() {
            const container = getCompareNoticeContainer();
            if (!container) return;
            const host = container.querySelector('.inline-notice-host');
            if (host) {
                host.remove();
            }
        }

        window.toggleCompareRadio = function(radio) {
            const stateKey = radio.name === 'compare-a' ? 'a' : 'b';

            if (radio.dataset.wasChecked === "true") {
                radio.checked = false;
                radio.dataset.wasChecked = "false";
                window.compareState[stateKey] = { version: null, payload: null };
            } else {
                document.querySelectorAll('input[name="' + radio.name + '"]').forEach(item => {
                    item.dataset.wasChecked = "false";
                });
                radio.checked = true;
                radio.dataset.wasChecked = "true";
                window.compareState[stateKey] = {
                    version: radio.value,
                    payload: radio.dataset.payload
                };
            }

            clearCompareNotice();
        };

        window.compareVersions = function() {
            ensureCompareStateInitialized();

            if (!window.compareState.a.version || !window.compareState.b.version) {
                clearCompareNotice();
                if (typeof window.appConfirm === "function") {
                    window.appConfirm({
                        title: "選択が必要です",
                        message: "比較する2つのバージョン（AとB）を選択してください。",
                        confirmLabel: "閉じる",
                        hideCancel: true
                    });
                }
                return;
            }

            clearCompareNotice();

            const payloadA = JSON.parse(decodeURIComponent((window.compareState.a.payload || '').replace(/\+/g, '%20')));
            const payloadB = JSON.parse(decodeURIComponent((window.compareState.b.payload || '').replace(/\+/g, '%20')));
            const verA = window.compareState.a.version;
            const verB = window.compareState.b.version;
            const titleEl = document.getElementById('diff-title-versions');
            const diffContent = document.getElementById('diff-content');

            if (!titleEl || !diffContent) {
                console.warn('compareVersions called without diff modal markup on page');
                return;
            }

            titleEl.textContent = 'バージョン ' + verA + ' (A) ➔ バージョン ' + verB + ' (B)';
            diffContent.innerHTML = '';

            const table = document.createElement('table');
            table.className = 'data-table';
            table.style.width = '100%';
            table.style.fontSize = '0.82rem';

            const thead = document.createElement('thead');
            thead.innerHTML = '<tr><th style="width:22%;text-align:left;">設定項目</th><th style="width:39%;text-align:left;color:#ef4444;">バージョン ' + verA + ' (A)</th><th style="width:39%;text-align:left;color:#10b981;">バージョン ' + verB + ' (B)</th></tr>';
            table.appendChild(thead);

            const tbody = document.createElement('tbody');
            const allKeys = Array.from(new Set([...Object.keys(payloadA), ...Object.keys(payloadB)]));
            let hasDiff = false;

            allKeys.forEach(key => {
                const valA = payloadA[key];
                const valB = payloadB[key];
                let strA = typeof valA === 'object' ? JSON.stringify(valA, null, 2) : String(valA !== undefined ? valA : '—');
                let strB = typeof valB === 'object' ? JSON.stringify(valB, null, 2) : String(valB !== undefined ? valB : '—');

                if (strA === 'undefined' || strA === '') strA = '—';
                if (strB === 'undefined' || strB === '') strB = '—';
                if (strA === strB) return;

                hasDiff = true;
                const tr = document.createElement('tr');
                tr.style.background = 'rgba(239, 68, 68, 0.015)';

                const tdKey = document.createElement('td');
                tdKey.style.fontWeight = '600';
                tdKey.style.color = 'var(--text-secondary)';
                tdKey.style.verticalAlign = 'top';
                tdKey.style.padding = '12px 10px';
                tdKey.textContent = key;

                const tdA = document.createElement('td');
                tdA.style.fontFamily = 'JetBrains Mono, monospace';
                tdA.style.whiteSpace = 'pre-wrap';
                tdA.style.color = '#f87171';
                tdA.style.background = 'rgba(239, 68, 68, 0.06)';
                tdA.style.verticalAlign = 'top';
                tdA.style.padding = '12px 10px';
                tdA.textContent = strA;

                const tdB = document.createElement('td');
                tdB.style.fontFamily = 'JetBrains Mono, monospace';
                tdB.style.whiteSpace = 'pre-wrap';
                tdB.style.color = '#34d399';
                tdB.style.background = 'rgba(16, 185, 129, 0.06)';
                tdB.style.verticalAlign = 'top';
                tdB.style.padding = '12px 10px';
                tdB.textContent = strB;

                tr.appendChild(tdKey);
                tr.appendChild(tdA);
                tr.appendChild(tdB);
                tbody.appendChild(tr);
            });

            if (!hasDiff) {
                diffContent.innerHTML = '<div style="text-align:center; padding:60px 0; color:var(--text-muted);"><i data-lucide="check-circle-2" style="width:36px; height:36px; color:var(--color-success); margin:0 auto 14px; display:block; opacity:0.85;"></i>設定項目に差分はありません。すべての構成値が同一です。</div>';
            } else {
                table.appendChild(tbody);
                diffContent.appendChild(table);
            }

            const modal = document.getElementById('diff-modal');
            if (!modal) {
                console.warn('compareVersions could not find diff modal element');
                return;
            }
            modal.style.display = 'flex';
            window.lockBodyScroll();
            if (window.lucide) {
                lucide.createIcons();
            }
        };

        window.closeDiffModal = function() {
            const modal = document.getElementById('diff-modal');
            if (!modal) return;
            modal.style.display = 'none';
            window.unlockBodyScroll();
        };

        document.addEventListener("DOMContentLoaded", () => {
            initSidebarVisibility();
            initIcons();
            initSidebarGroups();
            initTableSorting();
            initCompareState();
        });
        document.addEventListener("htmx:afterSwap", (e) => {
            initIcons();
            initSidebarGroups();
            initTableSorting();

            if (e.target.id === 'history-table-container' || e.target.id === 'tab-history' || e.target.closest?.('#history-table-container')) {
                restoreCompareState();
                syncCompareStateFromDom();
            } else if (document.querySelector('input[name="compare-a"], input[name="compare-b"]')) {
                syncCompareStateFromDom();
            } else {
                window.compareState.a = { version: null, payload: null };
                window.compareState.b = { version: null, payload: null };
                window.compareState.initialized = false;
            }
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
