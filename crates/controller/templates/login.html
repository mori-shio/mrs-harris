<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン | Mrs. Harris</title>
    <!-- Premium Stylesheet -->
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            z-index: 1;
        }
        .login-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }
        .login-brand h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #38bdf8 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .error-banner {
            background-color: var(--color-danger-glow);
            border: 1px solid rgba(244, 63, 94, 0.2);
            color: var(--color-danger);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>

    <div class="login-container">
        <div class="login-brand">
            <i data-lucide="network" style="color: var(--color-primary); width: 40px; height: 40px;"></i>
            <h1>Mrs. Harris</h1>
        </div>

        <div class="card">
            <h2 style="font-family: 'Outfit', sans-serif; font-size: 1.5rem; margin-bottom: 8px; font-weight: 700;">ようこそ</h2>
            <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 24px;">管理者アカウントでログインしてください。</p>

            {% if error.is_some() %}
            <div class="error-banner">
                <i data-lucide="alert-circle" style="width: 18px; height: 18px; flex-shrink: 0;"></i>
                <span>{{ error.as_ref().unwrap() }}</span>
            </div>
            {% endif %}

            <form action="/login" method="POST" hx-boost="false">
                <div class="form-group">
                    <label for="username">ユーザー名</label>
                    <div style="position: relative;">
                        <i data-lucide="user" style="position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; color: var(--text-muted);"></i>
                        <input type="text" id="username" name="username" class="form-control" placeholder="admin" required style="padding-left: 44px;" value="{{ username }}">
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 28px;">
                    <label for="password">パスワード</label>
                    <div style="position: relative;">
                        <i data-lucide="lock" style="position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; color: var(--text-muted);"></i>
                        <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required style="padding-left: 44px;">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px;">
                    <i data-lucide="log-in" style="width: 18px; height: 18px;"></i>
                    ログイン
                </button>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
