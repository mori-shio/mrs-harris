{% extends "base.html" %}

{% block title %}{{ job_name }} #{{ run_number }} | Mrs. Harris{% endblock %}

{% block nav_jobs %}active{% endblock %}

{% block content %}
{% include "runs/detail_live.html" %}

<style>
    .summary-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
    }
    @media (max-width: 900px) {
        .summary-grid {
            grid-template-columns: repeat(2, 1fr);
        }
    }
    @media (max-width: 600px) {
        .summary-grid {
            grid-template-columns: 1fr;
        }
    }
    .summary-item {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }
    .summary-label {
        font-size: 0.72rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-weight: 500;
    }
    .summary-value {
        font-size: 0.88rem;
        font-weight: 600;
        color: var(--text-primary);
        display: flex;
        align-items: center;
        gap: 6px;
        line-height: 1.5;
    }
</style>

<script>
    // Initialize DAG Visualizer
    function renderLiveDag() {
        const scriptEl = document.getElementById('dag-data');
        if (!scriptEl) return;
        
        try {
            const data = JSON.parse(scriptEl.textContent);
            const { tasks, edges, runs } = data;
            
            const svgG = document.getElementById('dag-g');
            const svgEl = document.getElementById('dag-svg');
            if (!svgG || !svgEl) return;
            svgG.innerHTML = ''; // Clear previous
            
            // Build adjacency
            const inDegree = {};
            const adj = {};
            tasks.forEach(t => {
                inDegree[t.name] = 0;
                adj[t.name] = [];
            });
            edges.forEach(e => {
                if (adj[e.from] && adj[e.to]) {
                    adj[e.from].push(e.to);
                    inDegree[e.to]++;
                }
            });
            
            const queue = [];
            const layers = {};
            tasks.forEach(t => {
                if (inDegree[t.name] === 0) {
                    queue.push({ name: t.name, layer: 0 });
                }
            });
            
            let maxLayer = 0;
            const layerGroups = {};
            while (queue.length > 0) {
                const { name, layer } = queue.shift();
                layers[name] = Math.max(layers[name] || 0, layer);
                maxLayer = Math.max(maxLayer, layers[name]);
                
                adj[name].forEach(child => {
                    queue.push({ name: child, layer: layer + 1 });
                });
            }
            
            tasks.forEach(t => {
                const l = layers[t.name] || 0;
                if (!layerGroups[l]) layerGroups[l] = [];
                layerGroups[l].push(t.name);
            });
            
            const colWidth = 180;
            const rowHeight = 70;
            const nodeWidth = 140;
            const nodeHeight = 40;
            const startX = 40;
            const startY = 30;
            const positions = {};
            
            // Draw nodes
            Object.keys(layerGroups).forEach(l => {
                const layer = parseInt(l);
                const nodes = layerGroups[layer];
                const colX = startX + layer * colWidth;
                
                nodes.forEach((nodeName, idx) => {
                    const nodeY = startY + idx * rowHeight;
                    positions[nodeName] = { x: colX, y: nodeY };
                    
                    // Task Run Status Check
                    const tr = runs.find(r => r.task_name === nodeName);
                    const status = tr ? tr.status_str : 'pending';
                    
                    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                    g.setAttribute('class', `dag-node dag-node-${status}`);
                    g.setAttribute('transform', `translate(${colX}, ${nodeY})`);
                    
                    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                    rect.setAttribute('width', nodeWidth);
                    rect.setAttribute('height', nodeHeight);
                    
                    // Set color styles dynamically based on status
                    let strokeColor = 'rgba(255,255,255,0.08)';
                    let fillColor = 'rgba(15, 23, 42, 0.8)';
                    let dashArray = 'none';
                    let animate = false;
                    
                    if (status === 'succeeded') {
                        strokeColor = 'var(--color-success)';
                        fillColor = 'rgba(16, 185, 129, 0.08)';
                    } else if (status === 'failed' || status === 'dead_letter') {
                        strokeColor = 'var(--color-danger)';
                        fillColor = 'rgba(244, 63, 94, 0.08)';
                    } else if (status === 'running') {
                        strokeColor = 'var(--color-info)';
                        fillColor = 'rgba(59, 130, 246, 0.08)';
                        dashArray = '4';
                        animate = true;
                    } else if (status === 'skipped') {
                        strokeColor = 'var(--color-warning)';
                        fillColor = 'rgba(245, 158, 11, 0.08)';
                    } else if (status === 'queued') {
                        strokeColor = '#94a3b8';
                        fillColor = 'rgba(148, 163, 184, 0.08)';
                    }
                    
                    rect.setAttribute('stroke', strokeColor);
                    rect.setAttribute('fill', fillColor);
                    rect.setAttribute('stroke-width', '2');
                    rect.setAttribute('rx', '8');
                    rect.setAttribute('ry', '8');
                    if (dashArray !== 'none') {
                        rect.setAttribute('stroke-dasharray', dashArray);
                        if (animate) {
                            const style = document.createElementNS('http://www.w3.org/2000/svg', 'style');
                            style.textContent = `@keyframes dash { to { stroke-dashoffset: -8; } }`;
                            rect.style.animation = 'dash 1s linear infinite';
                            g.appendChild(style);
                        }
                    }
                    g.appendChild(rect);
                    
                    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    text.setAttribute('x', nodeWidth / 2);
                    text.setAttribute('y', nodeHeight / 2 + 4);
                    text.setAttribute('text-anchor', 'middle');
                    text.setAttribute('fill', '#f8fafc');
                    text.setAttribute('style', 'font-size: 12px; font-weight: 500;');
                    text.textContent = nodeName;
                    g.appendChild(text);
                    
                    svgG.appendChild(g);
                });
            });
            
            // Draw Edges
            edges.forEach(edge => {
                const startNode = positions[edge.from];
                const endNode = positions[edge.to];
                if (startNode && endNode) {
                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    const x1 = startNode.x + nodeWidth;
                    const y1 = startNode.y + nodeHeight / 2;
                    const x2 = endNode.x;
                    const y2 = endNode.y + nodeHeight / 2;
                    const controlX = x1 + (x2 - x1) / 2;
                    const d = `M ${x1} ${y1} C ${controlX} ${y1}, ${controlX} ${y2}, ${x2} ${y2}`;
                    
                    path.setAttribute('d', d);
                    path.setAttribute('fill', 'none');
                    path.setAttribute('stroke', 'rgba(255,255,255,0.12)');
                    path.setAttribute('stroke-width', '2');
                    path.setAttribute('marker-end', 'url(#arrow)');
                    svgG.appendChild(path);
                }
            });
            
            let maxRowLength = 0;
            Object.keys(layerGroups).forEach(l => {
                maxRowLength = Math.max(maxRowLength, layerGroups[l].length);
            });
            svgEl.setAttribute('height', Math.max(220, startY + maxRowLength * rowHeight));
            
        } catch (e) {
            console.error('Error parsing DAG live data:', e);
        }
    }

    // Auto-trigger DAG rendering on DOM load and HTMX swaps
    document.addEventListener("DOMContentLoaded", renderLiveDag);
    document.addEventListener("htmx:afterSwap", renderLiveDag);
</script>

{% endblock %}
